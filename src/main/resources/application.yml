server:
  shutdown: graceful

spring:
  application:
    name: orderflow
  jpa:
    open-in-view:
    hibernate:
      ddl-auto: validate         # hibernate only validates mappings
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      probes:
        enabled: true            # enable for AWS
      show-details: when_authorized

app:
  security:
    jwt:
      issuer: orderflow
      access-token-ttl: 15m
      refresh-token-ttl: 7d
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  order:
    tax-rate: 0.08               # default flat rate for demos

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{requestId:-}]"