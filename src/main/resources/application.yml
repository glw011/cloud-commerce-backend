spring:
  application:
    name: orderflow
  jpa:
    open-in-view:
    hibernate:
      ddl-auto: validate         # hibernate only validates mappings
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      probes:
        enabled: true            # enable for AWS
      show-details: when_authorized

app:
  security:
    jwt:
      issuer: orderflow
      access-token-ttl: 15m
      refresh-token-ttl: 7d

  order:
    tax-rate: 0.08               # default flat rate for demos